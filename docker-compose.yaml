services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Password@123
      - MSSQL_PID=Developer
    volumes:
      - mssql_data:/var/opt/mssql
    restart: always

volumes:
  mssql_data: